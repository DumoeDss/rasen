name: Release

on:
  push:
    tags:
      - 'rasen-v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and upload tarball
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      # Install with devDependencies (no --prod): pnpm build needs them.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Pack tarball
        id: pack
        run: |
          tgz="$(npm pack | tail -n 1)"
          echo "Packed: $tgz"
          echo "tgz=$tgz" >> "$GITHUB_OUTPUT"

      - name: Upload tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.tgz }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for NPM_TOKEN
        id: token_check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::npm publish skipped — NPM_TOKEN not set"
          fi

      - name: Setup pnpm
        if: steps.token_check.outputs.present == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.token_check.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # Install with devDependencies (no --prod): pnpm build needs them.
      - name: Install dependencies
        if: steps.token_check.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build project
        if: steps.token_check.outputs.present == 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.token_check.outputs.present == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
