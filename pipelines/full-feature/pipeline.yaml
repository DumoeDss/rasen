name: full-feature
description: >-
  Full feature delivery pipeline: office hours validation, proposal with lead
  review, apply, a parallel fan-out of conditional expert reviews, a review
  cycle to drive fixes, then ship, retention, and archive.
stages:
  - id: office-hours
    skill: rasen-office-hours-command
    role: planner
    requires: []
    gate: true

  - id: propose
    skill: rasen-propose
    role: planner
    requires: [office-hours]
    leadReview: true
    gate: true

  - id: apply
    skill: rasen-apply-change
    role: implementer
    requires: [propose]
    gate: true

  - id: review
    skill: rasen-review
    role: reviewer
    requires: [apply]
    parallelGroup: experts
    condition: always

  - id: cso
    skill: rasen-cso
    role: reviewer
    requires: [apply]
    parallelGroup: experts
    condition: security-relevant

  - id: benchmark
    skill: rasen-benchmark
    role: reviewer
    requires: [apply]
    parallelGroup: experts
    condition: performance-sensitive

  - id: design-review
    skill: rasen-design-review
    role: reviewer
    requires: [apply]
    parallelGroup: experts
    condition: ui

  - id: qa
    skill: rasen-qa
    role: reviewer
    requires: [apply]
    parallelGroup: experts
    condition: ui

  - id: qa-only
    skill: rasen-qa-only
    role: reviewer
    requires: [apply]
    parallelGroup: experts
    condition: non-ui

  - id: review-loop
    skill: rasen-review-cycle
    role: fixer
    requires: [review, cso, benchmark, design-review, qa, qa-only]
    loop:
      kind: review-cycle
      maxRounds: 3

  - id: ship
    skill: rasen-ship
    role: shipper
    requires: [review-loop]
    gate: true
    model: sonnet

  - id: retain
    skill: rasen-retain
    role: reviewer
    requires: [ship]
    model: sonnet

  - id: archive
    skill: rasen-archive-change
    role: shipper
    requires: [retain]
    model: sonnet
