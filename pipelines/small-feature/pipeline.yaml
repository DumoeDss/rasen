name: small-feature
description: >-
  Lightweight feature pipeline: propose, apply, a single standard verification
  with a review cycle, then ship and archive.
stages:
  - id: propose
    skill: rasen-propose
    role: planner
    requires: []
    gate: true

  - id: apply
    skill: rasen-apply-change
    role: implementer
    requires: [propose]
    gate: true

  - id: verify
    skill: rasen-review
    role: reviewer
    requires: [apply]
    condition: always
    verifyPolicy: standard

  - id: review-loop
    skill: rasen-review-cycle
    role: fixer
    requires: [verify]
    loop:
      kind: review-cycle
      maxRounds: 3

  - id: ship
    skill: rasen-ship
    role: shipper
    requires: [review-loop]
    gate: true
    model: sonnet

  - id: archive
    skill: rasen-archive-change
    role: shipper
    requires: [ship]
    model: sonnet
