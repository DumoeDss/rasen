name: bug-fix
description: >-
  Minimal bug-fix pipeline: propose, apply, an adaptive verification, then ship
  and archive.
stages:
  - id: propose
    skill: rasen-propose
    role: planner
    requires: []
    gate: true

  - id: apply
    skill: rasen-apply-change
    role: implementer
    requires: [propose]
    gate: true

  - id: verify
    skill: rasen-review
    role: reviewer
    requires: [apply]
    verifyPolicy: adaptive

  - id: ship
    skill: rasen-ship
    role: shipper
    requires: [verify]
    gate: true
    model: sonnet

  - id: archive
    skill: rasen-archive-change
    role: shipper
    requires: [ship]
    model: sonnet
